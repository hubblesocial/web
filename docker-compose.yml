version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: axioris_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - axioris_network

  adminer:
    image: adminer:latest
    container_name: axioris_adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - axioris_network

volumes:
  postgres_data:

networks:
  axioris_network:
    driver: bridge
